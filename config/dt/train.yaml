env:
  env_name: dt
  plant_data_path: data/dt/data.json
  env_cfg:
    w1: 0.35
    w2: 0.35
    w3: 0.3
    p_geom: 1.0e-2
    window_size: null
    delta_t: 0
    n_mc: 2000
    q_prior: 0.05
    detector:
      alpha: 0.1

train:
  out_dir: output/dt/train
  seed: 1234
  beta_seed: 7890
  episodes: 200
  max_steps: 2000
  eval_every: 10
  eval_episodes: 10
  ckpt_every: 5
  resume: false

ddpg:
  hidden_dim: 32
  actor_lr: 1e-3
  critic_lr: 1e-3
  gamma: 0.99
  tau: 0.005
  buffer_size: 1000000
  batch_size: 512
  warmup_steps: 2000
  eps_start: 0.995
  eps_end: 0.05
  eps_decay: 0.995
  target_update_every: 1
  grad_clip: 1.0
