env:
  env_name: sm_dt_cont 
  plant_data_path: data/sm/data.json
  env_cfg:
    w1: 0.35
    w2: 0.35
    w3: 0.3
    p_geom: 1.0e-3  # 1/env.data.T = 41000?
    window_size: null
    delta_t: 0
    n_mc: 2000
    q_prior: 0.05
    detector:
      alpha: 0.005

eval:
  # this is for normal simulation
  # out_dir: output/sm_dt_cont/simulation
  out_dir: output/sm_dt_cont/tac/offline/delta=0.05
  overwrite: true
  steps_env: 41000
  reps: 40
  base_seed: 1223
  base_beta_seed: 6789

runs:
  # ---- no watermark ----
  # - watermark: {mode: none}
  #   policy: {type: none}
  #   attack: {type: none}

  # - watermark: {mode: none}
  #   policy: {type: none}
  #   attack:
  #     type: replay
  #     onset_t: 4000
  #     replay:
  #       start_idx: 4000
  #       wrap: false
  #       history:
  #         mode: run_nominal_once
  #         seed: 123
  #         beta_seed: 223

  # ---- constant covariance baseline ----
  - watermark:
      mode: constant_cov
      U: [[3974.05314763]]
    policy: {type: none}
    attack: {type: none}

  - watermark:
      mode: constant_cov
      U: [[3974.05314763]]
    policy: {type: none}
    attack:
      type: replay
      onset_t: 4000
      replay:
        start_idx: 4000
        wrap: false
        history:
          mode: run_nominal_once
          seed: 123
          beta_seed: 223

  # ---- learned DDPG watermarking (uses U = cov_from_action(action)) ----
  # - watermark: {mode: from_action}
  #   policy:
  #     type: ddpg
  #     ckpt_dir: output/sm_dt_disc/train
  #     which: best
  #     explore: false
  #     device: cpu
  #   attack: {type: none}

  # - watermark: {mode: from_action}
  #   policy:
  #     type: ddpg
  #     ckpt_dir: output/sm_dt_disc/train
  #     which: best
  #     explore: false
